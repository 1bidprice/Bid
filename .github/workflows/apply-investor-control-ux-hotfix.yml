name: Apply Investor Control Market Integrity v0.6.2

on:
  push:
    branches:
      - investor-control-v0.6-accounting-ux
    paths:
      - .github/workflows/apply-investor-control-ux-hotfix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: investor-control-v0.6-accounting-ux
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Apply v0.6.2 market-integrity patch
        shell: bash
        run: |
          python3 - <<'PY'
