name: Apply Investor Control UX Hotfix

on:
  push:
    branches:
      - investor-control-v0.6-accounting-ux
    paths:
      - .github/workflows/apply-investor-control-ux-hotfix.yml

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: investor-control-v0.6-accounting-ux
          fetch-depth: 0

      - name: Apply hotfix or produce diagnostics
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone

          report = []
          missing = []

          def apply(text, old, new, label, *, all_occurrences=False):
              if old in text:
                  count = text.count(old)
                  report.append(f'APPLY {label}: {count} match(es)')
                  return (text.replace(old, new) if all_occurrences else text.replace(old, new, 1))
              if new in text:
                  report.append(f'OK {label}: already applied')
                  return text
              report.append(f'MISSING {label}')
              missing.append(label)
              return text

          portfolio_path = Path('mobile/PortfolioApp.js')
          decision_path = Path('mobile/DecisionOverlay.js')
          package_path = Path('mobile/package.json')
          app_path = Path('mobile/app.json')

          portfolio_original = portfolio_path.read_text(encoding='utf-8')
          decision_original = decision_path.read_text(encoding='utf-8')
          package_original = package_path.read_text(encoding='utf-8')
          app_original = app_path.read_text(encoding='utf-8')

          portfolio = portfolio_original
          portfolio = apply(portfolio, "const VERSION = '0.6.0';", "const VERSION = '0.6.1';", 'portfolio version')
          portfolio = apply(portfolio, "edges={['bottom', 'left', 'right']}", "edges={['top', 'bottom', 'left', 'right']}", 'modal safe areas', all_occurrences=True)
          portfolio = apply(portfolio, "edges={['top', 'left', 'right']}", "edges={['top', 'bottom', 'left', 'right']}", 'main safe area')
          portfolio = apply(portfolio,
              '<View style={styles.sectionRow}><View><Text style={styles.section}>Συναλλαγές</Text><Text style={styles.muted}>Αγορά, πώληση και πραγματικό κόστος</Text></View><Pressable style={styles.primarySmall} onPress={openNewTransaction}><Text style={styles.whiteStrong}>Προσθήκη</Text></Pressable></View>',
              '<View style={styles.sectionRow}><View style={styles.grow}><Text style={styles.section}>Συναλλαγές</Text><Text style={styles.muted}>Αγορά, πώληση και πραγματικό κόστος</Text></View><Pressable style={styles.addSmall} onPress={openNewTransaction} accessibilityLabel="Προσθήκη συναλλαγής"><Text style={styles.addSmallText}>＋</Text></Pressable></View>',
              'compact transaction header')

          pairs = [
              ("content: { paddingHorizontal: 20, paddingTop: 20, paddingBottom: 125 }", "content: { paddingHorizontal: 16, paddingTop: 16, paddingBottom: 112 }", 'content spacing'),
              ("title: { color: '#16345f', fontSize: 40, lineHeight: 45", "title: { color: '#16345f', fontSize: 36, lineHeight: 41", 'main title'),
              ("titleCompact: { fontSize: 34 }", "titleCompact: { fontSize: 31 }", 'compact title'),
              ("gap: 12 }, grow: { flex: 1 },", "gap: 10 }, grow: { flex: 1, minWidth: 0 },", 'responsive header row'),
              ("rowGap: 12, marginTop: 14", "rowGap: 10, marginTop: 12", 'grid spacing'),
              ("width: '48%', minHeight: 118, borderRadius: 24", "width: '48.5%', minHeight: 102, borderRadius: 20", 'metric geometry'),
              ("padding: 17, justifyContent: 'space-between' }, metricCompact: { paddingHorizontal: 13 }, metricValue: { color: '#16345f', fontSize: 23, lineHeight: 29, fontWeight: '900', marginTop: 12", "padding: 14, justifyContent: 'space-between' }, metricCompact: { paddingHorizontal: 11 }, metricValue: { color: '#16345f', fontSize: 21, lineHeight: 26, fontWeight: '900', marginTop: 9", 'metric typography'),
              ("alignItems: 'center', justifyContent: 'space-between', gap: 12, marginTop: 28, marginBottom: 12", "alignItems: 'flex-end', justifyContent: 'space-between', gap: 10, marginTop: 22, marginBottom: 12", 'section header layout'),
              ("fontSize: 31, lineHeight: 38, fontWeight: '900', marginTop: 28, marginBottom: 14", "fontSize: 28, lineHeight: 34, fontWeight: '900', marginTop: 22, marginBottom: 12", 'section title'),
              ("fontSize: 24, fontWeight: '900', marginTop: 22, marginBottom: 10", "fontSize: 22, fontWeight: '900', marginTop: 20, marginBottom: 10", 'subsection title'),
              ("borderRadius: 26, borderWidth: 1, borderColor: '#d4deeb', padding: 20, marginBottom: 14", "borderRadius: 22, borderWidth: 1, borderColor: '#d4deeb', padding: 17, marginBottom: 12", 'cards'),
              ("fontSize: 24, lineHeight: 29, fontWeight: '900'", "fontSize: 21, lineHeight: 26, fontWeight: '900'", 'card title'),
              ("marginTop: 22, gap: 12 }, big: { color: '#16345f', fontSize: 43, lineHeight: 49", "marginTop: 18, gap: 10 }, big: { color: '#16345f', fontSize: 39, lineHeight: 45", 'price row'),
              ("change: { fontSize: 22, fontWeight: '900', paddingBottom: 8", "change: { fontSize: 21, fontWeight: '900', paddingBottom: 7", 'price change'),
              ("primarySmall: { minWidth: 112, height: 52", "addSmall: { width: 52, height: 52, flexShrink: 0, backgroundColor: '#0B66FF', borderRadius: 17, alignItems: 'center', justifyContent: 'center' }, addSmallText: { color: '#fff', fontSize: 29, lineHeight: 32, fontWeight: '500' }, primarySmall: { minWidth: 104, height: 50", 'small add button'),
              ("minHeight: 86, backgroundColor: '#fff'", "height: 78, backgroundColor: '#fff'", 'bottom nav height'),
              ("paddingHorizontal: 8, paddingTop: 7, paddingBottom: Platform.OS === 'android' ? 10 : 16", "paddingHorizontal: 6, paddingTop: 6, paddingBottom: 6", 'bottom nav padding'),
              ("borderRadius: 20, alignItems: 'center', justifyContent: 'center', paddingVertical: 7", "borderRadius: 18, alignItems: 'center', justifyContent: 'center', paddingVertical: 5", 'bottom nav item'),
              ("color: '#7c899d', fontSize: 22", "color: '#66758a', fontSize: 21", 'nav icon'),
              ("color: '#7c899d', fontSize: 11, marginTop: 2", "color: '#66758a', fontSize: 11, lineHeight: 14, marginTop: 1", 'nav text'),
              ("keyboardLayer: { maxHeight: '94%', width: '100%' }", "keyboardLayer: { flex: 1, width: '100%', justifyContent: 'flex-end', paddingTop: Platform.OS === 'android' ? 10 : 0 }", 'modal keyboard layer'),
              ("sheet: { backgroundColor: '#f8fbff', borderTopLeftRadius: 30, borderTopRightRadius: 30, overflow: 'hidden' }", "sheet: { maxHeight: '94%', backgroundColor: '#f8fbff', borderTopLeftRadius: 28, borderTopRightRadius: 28, overflow: 'hidden' }", 'modal sheet'),
              ("form: { padding: 22, paddingBottom: 34 }", "form: { paddingHorizontal: 20, paddingTop: 24, paddingBottom: Platform.OS === 'android' ? 72 : 42 }", 'modal form spacing'),
              ("sheetTitle: { color: '#16345f', fontSize: 29, fontWeight: '900' }", "sheetTitle: { color: '#16345f', fontSize: 27, lineHeight: 33, fontWeight: '900' }", 'modal title'),
              ("modalActions: { flexDirection: 'row', gap: 10, marginTop: 12 }", "modalActions: { flexDirection: 'row', gap: 10, marginTop: 14, marginBottom: 8 }", 'modal actions'),
          ]
          for old, new, label in pairs:
              portfolio = apply(portfolio, old, new, label)

          decision = decision_original
          decision = apply(decision, "const VERSION = '0.5.1';", "const VERSION = '0.6.1';", 'decision version')
          decision = apply(decision,
              '<Pressable style={styles.fab} onPress={open} accessibilityLabel="Άνοιγμα Decision Gate">\n        <Text style={styles.fabTop}>✓</Text>\n        <Text style={styles.fabText}>ΑΠΟΦΑΣΗ</Text>\n      </Pressable>',
              '<Pressable style={styles.fab} onPress={open} accessibilityLabel="Άνοιγμα Decision Gate" accessibilityHint="Έλεγχος επενδυτικής απόφασης">\n        <Text style={styles.fabTop}>✓</Text>\n      </Pressable>',
              'decision button markup')
          decision = apply(decision,
              "  fab: { position: 'absolute', right: 17, bottom: 88, zIndex: 20, elevation: 12, minWidth: 104, height: 54, paddingHorizontal: 14, borderRadius: 19, backgroundColor: '#07163e', flexDirection: 'row', alignItems: 'center', justifyContent: 'center', gap: 7, shadowColor: '#000', shadowOpacity: 0.22, shadowRadius: 9, shadowOffset: { width: 0, height: 4 } },\n  fabTop: { color: '#55a6ff', fontSize: 22, fontWeight: '900' },\n  fabText: { color: '#fff', fontSize: 11, fontWeight: '900', letterSpacing: 0.4 },",
              "  fab: { position: 'absolute', right: 14, bottom: 90, zIndex: 20, elevation: 10, width: 54, height: 54, borderRadius: 27, backgroundColor: '#07163e', alignItems: 'center', justifyContent: 'center', shadowColor: '#000', shadowOpacity: 0.18, shadowRadius: 7, shadowOffset: { width: 0, height: 3 } },\n  fabTop: { color: '#55a6ff', fontSize: 27, lineHeight: 31, fontWeight: '900' },\n  fabText: { display: 'none' },",
              'decision button style')

          package = apply(package_original, '"version": "0.6.0"', '"version": "0.6.1"', 'package version')
          app = apply(app_original, '"version": "0.6.0"', '"version": "0.6.1"', 'app version')
          app = apply(app, '"versionCode": 8', '"versionCode": 9', 'Android version code')
          app = apply(app, '"buildNumber": "8"', '"buildNumber": "9"', 'iOS build number')

          success = not missing
          if success:
              portfolio_path.write_text(portfolio, encoding='utf-8')
              decision_path.write_text(decision, encoding='utf-8')
              package_path.write_text(package, encoding='utf-8')
              app_path.write_text(app, encoding='utf-8')

          report_path = Path('mobile/ux-hotfix-diagnostics.txt')
          report_path.write_text(
              f"generated={datetime.now(timezone.utc).isoformat()}\nstatus={'APPLIED' if success else 'BLOCKED'}\n" +
              '\n'.join(report) +
              ("\nmissing=" + ', '.join(missing) if missing else '') + '\n',
              encoding='utf-8'
          )
          print(report_path.read_text(encoding='utf-8'))
          PY

      - name: Commit result
        shell: bash
        run: |
          git config user.name "Investor Control CI"
          git config user.email "actions@users.noreply.github.com"
          git add mobile/PortfolioApp.js mobile/DecisionOverlay.js mobile/package.json mobile/app.json mobile/ux-hotfix-diagnostics.txt
          git commit -m "fix(mobile): apply or diagnose Android UX hotfix v0.6.1"
          git push origin HEAD:investor-control-v0.6-accounting-ux
