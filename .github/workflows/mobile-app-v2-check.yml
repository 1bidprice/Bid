name: Validate Investor Control Mobile

on:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-app-v2-check.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor

      - name: Export Android bundle
        run: npx expo export --platform android --output-dir dist
