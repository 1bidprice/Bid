name: Apply Investor Control Premarket Fix v0.6.3

on:
  push:
    branches:
      - investor-control-v0.6-accounting-ux
    paths:
      - .github/workflows/apply-investor-control-v0.6.3.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: investor-control-v0.6-accounting-ux
          fetch-depth: 0

      - name: Apply v0.6.3 premarket percentage fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_required(path, old, new, label):
              text = path.read_text(encoding='utf-8')
              if old in text:
                  path.write_text(text.replace(old, new, 1), encoding='utf-8')
                  print(f'APPLY {label}')
                  return
              if new in text:
                  print(f'OK {label}: already applied')
                  return
              raise SystemExit(f'Patch blocked: {label} pattern not found in {path}')

          market = Path('mobile/src/market-data.js')
          portfolio = Path('mobile/PortfolioApp.js')
          decision = Path('mobile/DecisionOverlay.js')
          package = Path('mobile/package.json')
          app = Path('mobile/app.json')

          replace_required(
              market,
              """      const changeBase = ['pre-market', 'post-market'].includes(point.session) && finite(regularMarketPrice)
                ? regularMarketPrice
                : previousClose;""",
              """      const changeBase = point.session === 'post-market' && finite(regularMarketPrice)
                ? regularMarketPrice
                : previousClose;""",
              'premarket uses previous close',
          )
          replace_required(market, 'InvestorControl/0.6.2', 'InvestorControl/0.6.3', 'market user agent')
          replace_required(portfolio, "const VERSION = '0.6.1';", "const VERSION = '0.6.3';", 'portfolio version')
          replace_required(decision, "const VERSION = '0.6.1';", "const VERSION = '0.6.3';", 'decision version')
          replace_required(package, '"version": "0.6.1"', '"version": "0.6.3"', 'package version')
          replace_required(app, '"version": "0.6.1"', '"version": "0.6.3"', 'app version')
          replace_required(app, '"versionCode": 9', '"versionCode": 11', 'Android version code')
          replace_required(app, '"buildNumber": "9"', '"buildNumber": "11"', 'iOS build number')
          PY

      - name: Test session percentage bases
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('mobile/src/market-data.js').read_text(encoding='utf-8')
          assert "point.session === 'post-market' && finite(regularMarketPrice)" in source
          assert "['pre-market', 'post-market'].includes(point.session)" not in source
          assert round((2.58 - 2.46) / 2.46 * 100, 2) == 4.88
          assert round((2.60 - 2.57) / 2.57 * 100, 2) == 1.17
          print('PASS: premarket uses previous close and postmarket uses regular close.')
          PY

      - name: Commit verified source immediately
        shell: bash
        run: |
          git config user.name 'Investor Control CI'
          git config user.email 'actions@users.noreply.github.com'
          git add mobile/src/market-data.js mobile/PortfolioApp.js mobile/DecisionOverlay.js mobile/package.json mobile/app.json
          if git diff --cached --quiet; then
            echo 'Source already committed.'
          else
            git commit -m 'fix(mobile): correct premarket daily change v0.6.3'
            git pull --rebase origin investor-control-v0.6-accounting-ux
            git push origin HEAD:investor-control-v0.6-accounting-ux
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Expo Doctor
        working-directory: mobile
        run: npx expo-doctor@latest

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build standalone release APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verify and package APK
        shell: bash
        run: |
          APK='mobile/android/app/build/outputs/apk/release/app-release.apk'
          test -s "$APK"
          unzip -l "$APK" | grep -q 'assets/index.android.bundle'
          cp "$APK" 'mobile/Investor-Control-v0.6.3.apk'
          sha256sum 'mobile/Investor-Control-v0.6.3.apk' | tee 'mobile/Investor-Control-v0.6.3.sha256'

      - name: Upload verified APK
        uses: actions/upload-artifact@v4
        with:
          name: investor-control-v0.6.3-apk
          path: |
            mobile/Investor-Control-v0.6.3.apk
            mobile/Investor-Control-v0.6.3.sha256
          if-no-files-found: error
          retention-days: 90
