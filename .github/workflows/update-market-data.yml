name: Update Investor Control market data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-market-data.yml'
  schedule:
    - cron: '*/5 7-15 * * 1-5'

permissions:
  contents: write

concurrency:
  group: investor-control-market-data
  cancel-in-progress: true

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout published app
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Fetch latest Allwyn one-minute bar
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import math
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUT = Path('market-data.json')
          now_dt = datetime.now(timezone.utc)
          now = now_dt.isoformat().replace('+00:00', 'Z')
          previous = {}
          if OUT.exists():
              try:
                  previous = json.loads(OUT.read_text(encoding='utf-8'))
              except Exception:
                  previous = {}

          def get_json(url):
              request = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 InvestorControl/0.5',
                  'Accept': 'application/json,text/plain,*/*',
                  'Cache-Control': 'no-cache',
              })
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          def finite_price(value):
              return isinstance(value, (int, float)) and math.isfinite(value) and value > 0

          def yahoo_quote(ticker):
              encoded = urllib.parse.quote(ticker, safe='')
              last_error = None
              for host in ('query1.finance.yahoo.com', 'query2.finance.yahoo.com'):
                  try:
                      url = f'https://{host}/v8/finance/chart/{encoded}?range=1d&interval=1m&includePrePost=false&events=div%2Csplits'
                      payload = get_json(url)
                      result = ((payload.get('chart') or {}).get('result') or [None])[0]
                      if not result:
                          error = (payload.get('chart') or {}).get('error')
                          raise RuntimeError(str(error or 'empty Yahoo result'))

                      meta = result.get('meta') or {}
                      timestamps = result.get('timestamp') or []
                      indicators = result.get('indicators') or {}
                      quote_rows = indicators.get('quote') or [{}]
                      closes = (quote_rows[0] or {}).get('close') or []

                      price = None
                      timestamp = None
                      for ts, close in reversed(list(zip(timestamps, closes))):
                          if finite_price(close):
                              price = float(close)
                              timestamp = int(ts)
                              break

                      if price is None:
                          fallback = meta.get('regularMarketPrice')
                          if finite_price(fallback):
                              price = float(fallback)
                              timestamp = meta.get('regularMarketTime')

                      if price is None:
                          raise RuntimeError('invalid Yahoo price')

                      previous_close = meta.get('chartPreviousClose') or meta.get('previousClose')
                      updated_dt = datetime.fromtimestamp(timestamp, timezone.utc) if timestamp else now_dt
                      updated = updated_dt.isoformat().replace('+00:00', 'Z')
                      delay_seconds = max(0, int((now_dt - updated_dt).total_seconds()))

                      return {
                          'price': price,
                          'previousClose': float(previous_close) if finite_price(previous_close) else None,
                          'updatedAt': updated,
                          'checkedAt': now,
                          'delaySeconds': delay_seconds,
                          'source': 'Yahoo Finance latest 1-minute bar (unofficial)',
                          'providerSymbol': ticker,
                          'marketState': meta.get('marketState'),
                          'currency': meta.get('currency') or 'EUR',
                      }
                  except Exception as exc:
                      last_error = exc
              raise RuntimeError(str(last_error or 'Yahoo failed'))

          def stooq_quote(ticker):
              url = f'https://stooq.com/q/l/?s={urllib.parse.quote(ticker)}&f=sd2t2ohlcv&h&e=csv'
              request = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 InvestorControl/0.5'})
              with urllib.request.urlopen(request, timeout=20) as response:
                  text = response.read().decode('utf-8', errors='replace')
              rows = list(csv.DictReader(io.StringIO(text)))
              if not rows:
                  raise RuntimeError('empty Stooq result')
              row = rows[0]
              close = row.get('Close')
              if not close or close in {'N/D', '-'}:
                  raise RuntimeError('invalid Stooq price')
              price = float(close)
              if not finite_price(price):
                  raise RuntimeError('invalid Stooq price')
              date = row.get('Date')
              time = row.get('Time') or '17:20:00'
              updated = f'{date}T{time}+03:00' if date else now
              return {
                  'price': price,
                  'previousClose': None,
                  'updatedAt': updated,
                  'checkedAt': now,
                  'delaySeconds': None,
                  'source': 'Stooq public CSV fallback (unofficial)',
                  'providerSymbol': ticker,
                  'marketState': None,
                  'currency': 'EUR',
              }

          attempts = []
          quote = None
          for ticker in ('ALWN.AT', 'OPAP.AT', 'ALWN.ATH', 'OPAP.ATH'):
              try:
                  quote = yahoo_quote(ticker)
                  break
              except Exception as exc:
                  attempts.append(f'Yahoo {ticker}: {exc}')

          if quote is None:
              for ticker in ('alwn.gr', 'opap.gr', 'alwn.at', 'opap.at'):
                  try:
                      quote = stooq_quote(ticker)
                      break
                  except Exception as exc:
                      attempts.append(f'Stooq {ticker}: {exc}')

          if quote:
              change_pct = None
              if quote.get('previousClose'):
                  change_pct = ((quote['price'] - quote['previousClose']) / quote['previousClose']) * 100
              quote['changePct'] = change_pct
              status = 'ok'
              if isinstance(quote.get('delaySeconds'), int) and quote['delaySeconds'] > 1200:
                  status = 'stale'
              document = {
                  'version': 2,
                  'status': status,
                  'generatedAt': now,
                  'lastCheckedAt': now,
                  'source': 'Investor Control near-live market feed',
                  'error': None,
                  'quotes': {'ALWN.GR': quote},
              }
          else:
              document = previous if isinstance(previous, dict) else {}
              document.update({
                  'version': 2,
                  'status': 'stale' if (document.get('quotes') or {}).get('ALWN.GR') else 'error',
                  'lastCheckedAt': now,
                  'source': 'Investor Control near-live market feed',
                  'error': ' | '.join(attempts)[-2000:] or 'No quote source succeeded',
              })
              document.setdefault('generatedAt', now)
              document.setdefault('quotes', {})

          OUT.write_text(json.dumps(document, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(document, ensure_ascii=False, indent=2))
          PY

      - name: Publish changed market data
        shell: bash
        run: |
          git config user.name "Investor Control Bot"
          git config user.email "actions@users.noreply.github.com"
          git add market-data.json
          if git diff --cached --quiet; then
            echo "No market-data changes"
            exit 0
          fi
          git commit -m "Update near-live ALWN market data"
          git push origin HEAD:gh-pages
