name: Update Investor Control market data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-market-data.yml'
  schedule:
    - cron: '*/5 7-22 * * 1-5'

permissions:
  contents: write

concurrency:
  group: investor-control-market-data
  cancel-in-progress: true

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout published app
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Fetch portfolio quotes and FX
        shell: bash
        run: |
          python - <<'PY'
          import json
          import math
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUT = Path('market-data.json')
          now_dt = datetime.now(timezone.utc)
          now = now_dt.isoformat().replace('+00:00', 'Z')

          previous = {}
          if OUT.exists():
              try:
                  previous = json.loads(OUT.read_text(encoding='utf-8'))
              except Exception:
                  previous = {}

          def finite(value):
              return isinstance(value, (int, float)) and math.isfinite(value) and value > 0

          def get_json(url):
              request = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 InvestorControl/0.5.1',
                  'Accept': 'application/json,text/plain,*/*',
                  'Cache-Control': 'no-cache',
              })
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          def yahoo_quote(ticker):
              encoded = urllib.parse.quote(ticker, safe='')
              last_error = None
              for host in ('query1.finance.yahoo.com', 'query2.finance.yahoo.com'):
                  try:
                      url = f'https://{host}/v8/finance/chart/{encoded}?range=1d&interval=1m&includePrePost=false&events=div%2Csplits'
                      payload = get_json(url)
                      result = ((payload.get('chart') or {}).get('result') or [None])[0]
                      if not result:
                          error = (payload.get('chart') or {}).get('error')
                          raise RuntimeError(str(error or 'empty Yahoo result'))

                      meta = result.get('meta') or {}
                      timestamps = result.get('timestamp') or []
                      closes = (((result.get('indicators') or {}).get('quote') or [{}])[0] or {}).get('close') or []

                      price = None
                      timestamp = None
                      for ts, close in reversed(list(zip(timestamps, closes))):
                          if finite(close):
                              price = float(close)
                              timestamp = int(ts)
                              break

                      if price is None and finite(meta.get('regularMarketPrice')):
                          price = float(meta['regularMarketPrice'])
                          timestamp = meta.get('regularMarketTime')

                      if price is None:
                          raise RuntimeError('invalid Yahoo price')

                      previous_close = meta.get('chartPreviousClose') or meta.get('previousClose')
                      updated_dt = datetime.fromtimestamp(timestamp, timezone.utc) if timestamp else now_dt
                      return {
                          'price': price,
                          'previousClose': float(previous_close) if finite(previous_close) else None,
                          'updatedAt': updated_dt.isoformat().replace('+00:00', 'Z'),
                          'checkedAt': now,
                          'delaySeconds': max(0, int((now_dt - updated_dt).total_seconds())),
                          'source': 'Yahoo Finance latest 1-minute bar (unofficial)',
                          'providerSymbol': ticker,
                          'marketState': meta.get('marketState'),
                          'currency': meta.get('currency') or None,
                      }
                  except Exception as exc:
                      last_error = exc
              raise RuntimeError(str(last_error or 'Yahoo failed'))

          def first_quote(tickers, errors):
              for ticker in tickers:
                  try:
                      return yahoo_quote(ticker)
                  except Exception as exc:
                      errors.append(f'Yahoo {ticker}: {exc}')
              return None

          errors = []
          quotes = {}

          fx_quote = first_quote(('EURUSD=X',), errors)
          eurusd = fx_quote['price'] if fx_quote and finite(fx_quote.get('price')) else None

          alwn = first_quote(('ALWN.AT', 'OPAP.AT', 'ALWN.ATH', 'OPAP.ATH'), errors)
          if alwn:
              alwn['nativePrice'] = alwn['price']
              alwn['nativePreviousClose'] = alwn.get('previousClose')
              alwn['nativeCurrency'] = alwn.get('currency') or 'EUR'
              alwn['currency'] = 'EUR'
              alwn['fxRate'] = 1.0
              alwn['changePct'] = (
                  ((alwn['price'] - alwn['previousClose']) / alwn['previousClose']) * 100
                  if finite(alwn.get('previousClose')) else None
              )
              quotes['ALWN.GR'] = alwn

          spce = first_quote(('SPCE',), errors)
          if spce:
              native_price = spce['price']
              native_previous = spce.get('previousClose')
              native_currency = spce.get('currency') or 'USD'

              if native_currency == 'USD':
                  if not finite(eurusd):
                      errors.append('EURUSD=X: unavailable; SPCE conversion skipped')
                      spce = None
                  else:
                      spce['price'] = native_price / eurusd
                      spce['previousClose'] = native_previous / eurusd if finite(native_previous) else None
                      spce['fxRate'] = eurusd
                      spce['source'] += ' · converted USD→EUR with EURUSD=X'

              if spce:
                  spce['nativePrice'] = native_price
                  spce['nativePreviousClose'] = native_previous
                  spce['nativeCurrency'] = native_currency
                  spce['currency'] = 'EUR'
                  spce['changePct'] = (
                      ((native_price - native_previous) / native_previous) * 100
                      if finite(native_previous) else None
                  )
                  quotes['SPCE.US'] = spce

          previous_quotes = previous.get('quotes') if isinstance(previous, dict) else {}
          if not isinstance(previous_quotes, dict):
              previous_quotes = {}

          for symbol in ('ALWN.GR', 'SPCE.US'):
              if symbol not in quotes and symbol in previous_quotes:
                  stale = dict(previous_quotes[symbol])
                  stale['checkedAt'] = now
                  stale['stale'] = True
                  quotes[symbol] = stale

          fresh_count = sum(1 for q in quotes.values() if not q.get('stale'))
          stale_count = sum(1 for q in quotes.values() if q.get('stale'))
          status = 'ok' if fresh_count == len(quotes) and quotes else 'stale' if quotes else 'error'

          document = {
              'version': 3,
              'status': status,
              'generatedAt': now,
              'lastCheckedAt': now,
              'source': 'Investor Control multi-market near-live feed',
              'error': ' | '.join(errors)[-3000:] if errors else None,
              'fxRates': {
                  'EURUSD': {
                      'rate': eurusd,
                      'updatedAt': fx_quote.get('updatedAt') if fx_quote else None,
                      'source': fx_quote.get('source') if fx_quote else None,
                  }
              },
              'quotes': quotes,
              'summary': {
                  'fresh': fresh_count,
                  'stale': stale_count,
                  'symbols': sorted(quotes.keys()),
              },
          }

          OUT.write_text(json.dumps(document, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(document, ensure_ascii=False, indent=2))
          PY

      - name: Publish changed market data
        shell: bash
        run: |
          git config user.name "Investor Control Bot"
          git config user.email "actions@users.noreply.github.com"
          git add market-data.json
          if git diff --cached --quiet; then
            echo "No market-data changes"
            exit 0
          fi
          git commit -m "Update ALWN, SPCE and EURUSD market data"
          git push origin HEAD:gh-pages
