<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b66ff">
  <title>Investor Control</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f3f6fb;color:#10233f;display:grid;place-items:center;min-height:100vh;padding:24px;box-sizing:border-box}
    .card{max-width:520px;background:white;border-radius:24px;padding:28px;box-shadow:0 18px 60px rgba(15,35,65,.16);text-align:center}
    .spinner{width:44px;height:44px;border:5px solid #dce7f8;border-top-color:#0b66ff;border-radius:50%;margin:0 auto 18px;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
    h1{margin:0 0 8px;font-size:30px}p{line-height:1.55;color:#607089}.error{color:#a82323;text-align:left;white-space:pre-wrap}
  </style>
</head>
<body>
  <main class="card">
    <div class="spinner" id="spinner"></div>
    <h1>Investor Control</h1>
    <p id="status">Φόρτωση της εφαρμογής…</p>
    <pre id="error" class="error"></pre>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
  <script>
  (async()=>{
    const status=document.getElementById('status');
    const error=document.getElementById('error');
    try{
      if(!window.fflate) throw new Error('Δεν φορτώθηκε ο μηχανισμός αποσυμπίεσης.');
      const names=['00','01','02','03','04','05a','05b','05c','05d','05e','06'];
      const parts=[];
      for(const name of names){
        status.textContent=`Φόρτωση αρχείων ${parts.length+1}/${names.length}…`;
        const r=await fetch(`chunks/${name}`,{cache:'no-store'});
        if(!r.ok) throw new Error(`Αποτυχία φόρτωσης ${name}: ${r.status}`);
        parts.push((await r.text()).trim());
      }
      const b64=parts.join('');
      const binary=atob(b64);
      const bytes=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
      const files=fflate.unzipSync(bytes);
      const dec=new TextDecoder();
      const html=dec.decode(files['index.html']);
      const css=dec.decode(files['styles.css']);
      let js=dec.decode(files['app.js']);
      js=js.replace("id: crypto.randomUUID(),","id: (globalThis.crypto && typeof globalThis.crypto.randomUUID === 'function' ? globalThis.crypto.randomUUID() : `tx-${Date.now()}-${Math.random().toString(16).slice(2)}`),");
      let page=html
        .replace('<link rel="manifest" href="manifest.webmanifest" />','')
        .replace('<link rel="icon" href="icon.svg" type="image/svg+xml" />','')
        .replace('<link rel="stylesheet" href="styles.css" />',`<style>${css}</style>`)
        .replace('<script src="app.js" defer><\/script>',`<script>${js.replace(/<\\/script/gi,'<\\/script')}<\/script>`);
      document.open();
      document.write(page);
      document.close();
    }catch(e){
      document.getElementById('spinner')?.remove();
      status.textContent='Η εφαρμογή δεν φόρτωσε.';
      error.textContent=e && e.stack ? e.stack : String(e);
    }
  })();
  </script>
</body>
</html>
