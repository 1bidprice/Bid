<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b66ff">
  <title>Investor Control 0.4.1</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f3f6fb;color:#132238;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px;box-sizing:border-box}
    .card{background:#fff;border:1px solid #dce4ef;border-radius:24px;box-shadow:0 14px 36px rgba(22,44,78,.1);padding:28px;max-width:520px;text-align:center}
    .spin{width:44px;height:44px;margin:0 auto 18px;border:5px solid #dbe7f8;border-top-color:#0b66ff;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
    p{color:#748199;line-height:1.5}.error{color:#a82323;white-space:pre-wrap;text-align:left}
  </style>
</head>
<body>
  <main class="card">
    <div class="spin" id="spin"></div>
    <h1>Investor Control</h1>
    <p id="status">Φόρτωση της αυτοματοποιημένης έκδοσης 0.4.1…</p>
    <pre id="error" class="error"></pre>
  </main>
  <script>
  (async()=>{
    const status=document.getElementById('status');
    const error=document.getElementById('error');
    try{
      const response=await fetch('../index.html?source=v041-'+Date.now(),{cache:'no-store'});
      if(!response.ok) throw new Error('Αποτυχία φόρτωσης βασικής εφαρμογής: '+response.status);
      let html=await response.text();
      html=html
        .replace('<head>','<head><base href="../">')
        .replace('<script src="app.js" defer><\/script>',`<script>
          (()=>{
            const files=['app-part1.js','app-part2.js','app-part3.js','app-part4.js','app-part5.js','app-part6.js','app-run.js','automation.js'];
            let i=0;
            const next=()=>{
              if(i>=files.length)return;
              const s=document.createElement('script');
              s.src=files[i++]+'?v=041-'+Date.now();
              s.async=false;
              s.onload=next;
              s.onerror=()=>{document.body.innerHTML='<main style="font-family:system-ui;padding:24px"><h1>Investor Control</h1><p>Αποτυχία φόρτωσης αυτοματοποιημένης έκδοσης.</p></main>'};
              document.head.appendChild(s);
            };
            next();
          })();
        <\/script>`);
      document.open();
      document.write(html);
      document.close();
    }catch(e){
      document.getElementById('spin')?.remove();
      status.textContent='Η νέα έκδοση δεν φόρτωσε.';
      error.textContent=e?.stack||String(e);
    }
  })();
  </script>
</body>
</html>
