<!doctype html><html lang="el"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b66ff"><title>Ενημέρωση Investor Control</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f3f6fb;color:#132238;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px;box-sizing:border-box}.card{background:#fff;border:1px solid #dce4ef;border-radius:24px;box-shadow:0 14px 36px rgba(22,44,78,.1);padding:28px;max-width:520px;text-align:center}.spin{width:44px;height:44px;margin:0 auto 18px;border:5px solid #dbe7f8;border-top-color:#0b66ff;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{color:#748199;line-height:1.5}</style></head><body><main class="card"><div class="spin"></div><h1>Investor Control</h1><p id="status">Καθαρισμός της παλιάς έκδοσης και εγκατάσταση της αυτοματοποίησης…</p></main><script>(async()=>{const status=document.getElementById('status');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}localStorage.removeItem('investor-control-cache-reset');status.textContent='Η ενημέρωση ολοκληρώθηκε. Άνοιγμα εφαρμογής…';setTimeout(()=>location.replace('./?v=041&fresh='+Date.now()),600);}catch(e){status.textContent='Άνοιγμα εφαρμογής…';setTimeout(()=>location.replace('./?v=041&fresh='+Date.now()),800);}})();</script></body></html>
